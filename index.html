<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
const { useState, useEffect, useRef, useCallback } = React;

const INTERVIEW_STAGES = [
  { id:"context", label:{nl:"Context",en:"Context"}, questions:[
    {nl:"Wat is de naam of werktitel van dit initiatief?",en:"What is the name or working title of this initiative?"},
    {nl:"Beschrijf in één zin wat je wil oplossen of bereiken.",en:"Describe in one sentence what you want to solve or achieve."},
    {nl:"In welke afdeling of context speelt dit zich af?",en:"In which department or context does this take place?"},
  ]},
  { id:"problem", label:{nl:"Het Probleem",en:"The Problem"}, questions:[
    {nl:"Welk concreet probleem ervaren mensen nu? Kun je een voorbeeld geven van wanneer dit misgaat?",en:"What concrete problem are people experiencing now? Can you give an example of when this goes wrong?"},
    {nl:"Hoe lang bestaat dit probleem al en waarom wordt het nu pas opgepakt?",en:"How long has this problem existed and why is it only being addressed now?"},
    {nl:"Wat zijn de gevolgen als we dit probleem NIET oplossen? Wat kost het de organisatie?",en:"What are the consequences if we do NOT solve this problem? What does it cost the organisation?"},
    {nl:"Hoe wordt dit nu opgelost (workarounds)? Wat werkt er niet aan die aanpak?",en:"How is this currently solved (workarounds)? What doesn't work about that approach?"},
  ]},
  { id:"goal", label:{nl:"Het Doel",en:"The Goal"}, questions:[
    {nl:"Wat wil je concreet bereiken? Hoe ziet succes eruit over 6 maanden?",en:"What do you concretely want to achieve? What does success look like in 6 months?"},
    {nl:"Welk overkoepelend bedrijfsdoel draagt dit bij? Is dit strategisch geprioriteerd?",en:"Which overarching business objective does this contribute to? Is this strategically prioritised?"},
    {nl:"Hoe meet je of dit initiatief geslaagd is? Welke KPIs of metrics gebruik je?",en:"How do you measure whether this initiative is successful? Which KPIs or metrics do you use?"},
  ]},
  { id:"users", label:{nl:"Gebruikers",en:"Users"}, questions:[
    {nl:"Wie zijn de primaire gebruikers van de oplossing? Beschrijf hun rol en context.",en:"Who are the primary users of the solution? Describe their role and context."},
    {nl:"Zijn er secundaire gebruikers of stakeholders die indirect baat hebben?",en:"Are there secondary users or stakeholders who benefit indirectly?"},
    {nl:"Wie heeft er beslissingsbevoegdheid over dit initiatief? Wie is de eigenaar?",en:"Who has decision-making authority over this initiative? Who is the owner?"},
    {nl:"Zijn er partijen die weerstand kunnen bieden? Waarom?",en:"Are there parties who might resist? Why?"},
  ]},
  { id:"scope", label:{nl:"Scope",en:"Scope"}, questions:[
    {nl:"Wat valt absoluut binnen scope? Noem de 3 meest essentiële onderdelen.",en:"What is absolutely within scope? Name the 3 most essential components."},
    {nl:"Wat valt expliciet BUITEN scope voor deze versie? Waarom?",en:"What is explicitly OUT of scope for this version? Why?"},
    {nl:"Zijn er technische, juridische of organisatorische beperkingen waar we rekening mee moeten houden?",en:"Are there technical, legal or organisational constraints we need to consider?"},
    {nl:"Welke integraties met bestaande systemen zijn nodig?",en:"Which integrations with existing systems are required?"},
  ]},
  { id:"privacy", label:{nl:"AVG & Privacy",en:"GDPR"}, questions:[
    {nl:"Worden er persoonsgegevens verwerkt? Zo ja, welke categorieën?",en:"Are personal data being processed? If so, which categories?"},
    {nl:"Is er al een DPIA uitgevoerd of vereist?",en:"Has a DPIA been conducted or is it required?"},
    {nl:"Wie is de verwerkingsverantwoordelijke en is de privacyofficer betrokken?",en:"Who is the data controller and is the privacy officer involved?"},
  ]},
  { id:"open", label:{nl:"Open Vragen",en:"Open Questions"}, questions:[
    {nl:"Welke informatie mis je nog om een goede beslissing te nemen?",en:"What information are you still missing to make a good decision?"},
    {nl:"Zijn er aannames die je maakt die nog gevalideerd moeten worden?",en:"Are there assumptions you're making that still need to be validated?"},
    {nl:"Wie moet je nog spreken of raadplegen voor je dit kunt starten?",en:"Who do you still need to speak to or consult before you can start this?"},
  ]},
];

const SYSTEM_PROMPT = (lang) => lang === "nl"
  ? `Je bent een ervaren product manager en business analist die een business owner interviewt om een feature beschrijving op te stellen.
Jouw taak:
- Stel verdiepende vervolgvragen gebaseerd op het antwoord van de gebruiker
- Vraag door naar het WAAROM achter antwoorden
- Identificeer tegenstrijdigheden of vaagheden en benoem die vriendelijk
- Wees concreet en direct, maar empathisch
- Houd je antwoord beknopt (max 3 zinnen + vervolgvraag)
- Sluit altijd af met één concrete vervolgvraag
- Schrijf in het Nederlands`
  : `You are an experienced product manager and business analyst interviewing a business owner to create a feature description.
Your task:
- Ask deepening follow-up questions based on the user's answer
- Probe for the WHY behind answers
- Identify contradictions or vagueness and mention them kindly
- Be concrete and direct, but empathetic
- Keep your response concise (max 3 sentences + follow-up question)
- Always end with one concrete follow-up question
- Write in English`;

function App() {
  const [fbReady, setFbReady] = useState(!!window._fbReady);
  const [user, setUser] = useState(null);
  const [lang, setLang] = useState("nl");
  const [view, setView] = useState("dashboard");
  const [sessions, setSessions] = useState([]);
  const [activeSession, setActiveSession] = useState(null);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [stageIndex, setStageIndex] = useState(0);
  const [questionIndex, setQuestionIndex] = useState(0);
  const [document_, setDocument] = useState(null);
  const [editingDoc, setEditingDoc] = useState(false);
  const [docDraft, setDocDraft] = useState(null);
  const [newSessionTitle, setNewSessionTitle] = useState("");
  const [showNewSession, setShowNewSession] = useState(false);
  const [inviteEmail, setInviteEmail] = useState("");
  const messagesEndRef = useRef(null);
  const t = (nl, en) => lang === "nl" ? nl : en;

  useEffect(() => {
    if (fbReady) return;
    const handler = () => setFbReady(true);
    window.addEventListener("fb-ready", handler);
    return () => window.removeEventListener("fb-ready", handler);
  }, [fbReady]);

  useEffect(() => {
    if (!fbReady) return;
    const { onAuthStateChanged } = window._fbFns;
    return onAuthStateChanged(window._fbAuth, u => setUser(u));
  }, [fbReady]);

  useEffect(() => {
    if (!user || !fbReady) return;
    const { collection, query, orderBy, onSnapshot } = window._fbFns;
    const q = query(collection(window._fbDb, "pd_sessions"), orderBy("createdAt", "desc"));
    return onSnapshot(q, snap => {
      setSessions(snap.docs
        .filter(d => d.data().members?.includes(user.email) || d.data().ownerId === user.uid)
        .map(d => ({ id: d.id, ...d.data() })));
    });
  }, [user, fbReady]);

  useEffect(() => {
    if (!activeSession || !fbReady) return;
    const { collection, query, orderBy, onSnapshot } = window._fbFns;
    const q = query(collection(window._fbDb, "pd_sessions", activeSession.id, "messages"), orderBy("createdAt", "asc"));
    return onSnapshot(q, snap => {
      setMessages(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    });
  }, [activeSession, fbReady]);

  useEffect(() => {
    if (!activeSession || !fbReady) return;
    const { doc, onSnapshot } = window._fbFns;
    return onSnapshot(doc(window._fbDb, "pd_documents", activeSession.id), snap => {
      if (snap.exists()) setDocument({ id: snap.id, ...snap.data() });
      else setDocument(null);
    });
  }, [activeSession, fbReady]);

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages]);

  const login = async () => {
    const { signInWithPopup } = window._fbFns;
    window._fbGoogleProvider.setCustomParameters({ prompt: "select_account" });
    await signInWithPopup(window._fbAuth, window._fbGoogleProvider);
  };

  const createSession = async () => {
    if (!newSessionTitle.trim()) return;
    const { collection, addDoc, serverTimestamp, doc: fbDoc, setDoc } = window._fbFns;
    const ref = await addDoc(collection(window._fbDb, "pd_sessions"), {
      title: newSessionTitle, ownerId: user.uid, ownerEmail: user.email,
      ownerName: user.displayName, members: [user.email], lang,
      stageIndex: 0, questionIndex: 0, createdAt: serverTimestamp(), status: "active"
    });
    const session = { id: ref.id, title: newSessionTitle, ownerId: user.uid, ownerEmail: user.email, members: [user.email], lang, stageIndex: 0, questionIndex: 0 };
    setActiveSession(session);
    setStageIndex(0); setQuestionIndex(0);
    setNewSessionTitle(""); setShowNewSession(false);
    const firstQ = INTERVIEW_STAGES[0].questions[0][lang];
    await addDoc(collection(window._fbDb, "pd_sessions", ref.id, "messages"), {
      role: "assistant", content: firstQ, createdAt: serverTimestamp()
    });
    setView("session");
  };

  const openSession = (s) => {
    setActiveSession(s);
    setStageIndex(s.stageIndex || 0);
    setQuestionIndex(s.questionIndex || 0);
    setView("session");
  };

  const sendMessage = async () => {
    if (!input.trim() || loading) return;
    const userMsg = input.trim();
    setInput(""); setLoading(true);
    const { collection, addDoc, serverTimestamp, doc: fbDoc, updateDoc } = window._fbFns;
    await addDoc(collection(window._fbDb, "pd_sessions", activeSession.id, "messages"), {
      role: "user", content: userMsg, createdAt: serverTimestamp()
    });
    const stage = INTERVIEW_STAGES[stageIndex];
    const isLastQ = questionIndex >= stage.questions.length - 1;
    const isLastStage = stageIndex >= INTERVIEW_STAGES.length - 1;
    const history = messages.map(m => ({ role: m.role, content: m.content }));
    history.push({ role: "user", content: userMsg });
    const systemContext = `${SYSTEM_PROMPT(lang)}\n\nHuidige fase: ${stage.label[lang]}\nHuidige vraag was: ${stage.questions[questionIndex][lang]}\n\n${isLastQ && !isLastStage ? `Na je reactie, introduceer de volgende fase: "${INTERVIEW_STAGES[stageIndex+1].label[lang]}" en stel de eerste vraag.` : isLastStage && isLastQ ? "Dit was de laatste vraag. Geef een afsluitende samenvatting en zeg dat het document nu gegenereerd kan worden via de knop bovenaan." : "Stel een verdiepende vervolgvraag OF beweeg naar de volgende vraag als het antwoord volledig is."}`;
    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, system:systemContext, messages:history })
      });
      const data = await resp.json();
      const aiText = data.content?.[0]?.text || "...";
      await addDoc(collection(window._fbDb, "pd_sessions", activeSession.id, "messages"), {
        role:"assistant", content:aiText, createdAt:serverTimestamp()
      });
      let newStage = stageIndex, newQ = questionIndex;
      if (isLastQ && !isLastStage) { newStage = stageIndex+1; newQ = 0; }
      else if (!isLastQ) { newQ = questionIndex+1; }
      setStageIndex(newStage); setQuestionIndex(newQ);
      await updateDoc(fbDoc(window._fbDb, "pd_sessions", activeSession.id), { stageIndex:newStage, questionIndex:newQ });
    } catch(e) { console.error(e); }
    setLoading(false);
  };

  const generateDocument = async () => {
    setLoading(true);
    const { doc: fbDoc, setDoc, serverTimestamp } = window._fbFns;
    const convo = messages.map(m => `${m.role==="user"?"Business Owner":"Analist"}: ${m.content}`).join("\n\n");
    const prompt = `Op basis van dit interview, genereer een feature beschrijving werkdocument in JSON met deze exacte structuur:
{"title":"...","waardehypothese":"...","strategischeRelevantie":"...","voorWie":[{"rol":"...","beschrijving":"..."}],"scope":["..."],"buitenScope":["..."],"acceptatiecriteria":["..."],"avg":{"persoonsgegevens":"...","dpia":"...","verwerkingsverantwoordelijke":"..."},"openVragen":[{"vraag":"...","aanWie":"...","eigenaar":"..."}],"acties":[{"actie":"...","verantwoordelijke":"...","eigenaar":"..."}]}
Reageer ALLEEN met de JSON, geen uitleg of markdown.
Interview:\n${convo}`;
    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, messages:[{role:"user",content:prompt}] })
      });
      const data = await resp.json();
      const raw = data.content?.[0]?.text?.replace(/```json|```/g,"").trim();
      const parsed = JSON.parse(raw);
      await setDoc(fbDoc(window._fbDb, "pd_documents", activeSession.id), {
        ...parsed, sessionId:activeSession.id, updatedAt:serverTimestamp()
      });
      setView("document");
    } catch(e) { console.error(e); alert("Genereren mislukt, probeer opnieuw."); }
    setLoading(false);
  };

  const saveDocument = async () => {
    const { doc: fbDoc, setDoc, serverTimestamp } = window._fbFns;
    await setDoc(fbDoc(window._fbDb, "pd_documents", activeSession.id), {
      ...docDraft, sessionId:activeSession.id, updatedAt:serverTimestamp()
    });
    setEditingDoc(false);
  };

  const inviteStakeholder = async () => {
    if (!inviteEmail.trim() || !activeSession) return;
    const { doc: fbDoc, updateDoc } = window._fbFns;
    const newMembers = [...(activeSession.members||[]), inviteEmail.trim()];
    await updateDoc(fbDoc(window._fbDb, "pd_sessions", activeSession.id), { members: newMembers });
    setActiveSession({...activeSession, members: newMembers});

    // Open mailto with pre-filled invitation
    const appUrl = window.location.href.split("?")[0];
    const subject = encodeURIComponent(`Uitnodiging: Problem Discovery sessie "${activeSession.title}"`);
    const body = encodeURIComponent(
`Hallo,

${user.displayName} nodigt je uit om deel te nemen aan een Problem Discovery sessie.

Sessie: ${activeSession.title}

Klik op de link hieronder om in te loggen:
${appUrl}

Belangrijk: log in met dit emailadres: ${inviteEmail.trim()}

Tot zo!`
    );
    window.open(`mailto:${inviteEmail.trim()}?subject=${subject}&body=${body}`);
    setInviteEmail("");
  };

  if (!fbReady) return <div className="login-page"><div className="login-card"><div className="login-icon">⏳</div><p style={{color:"#666"}}>Firebase laden...</p></div></div>;

  if (!user) return (
    <div className="login-page">
      <div className="login-card">
        <div className="login-icon">🎯</div>
        <h1>Problem Discovery</h1>
        <p>{t("Breng samen met je business owner het probleem scherp in beeld. Van interview tot werkdocument.","Sharpen the problem definition together with your business owner. From interview to working document.")}</p>
        <button className="google-btn" onClick={login}>
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
          {t("Inloggen met Google","Sign in with Google")}
        </button>
      </div>
    </div>
  );

  return (
    <div className="app">
      <nav className="nav">
        <div className="nav-brand">🎯 Problem Discovery</div>
        <div className="nav-right">
          <div className="lang-toggle">
            <button className={`lang-btn ${lang==="nl"?"active":""}`} onClick={()=>setLang("nl")}>NL</button>
            <button className={`lang-btn ${lang==="en"?"active":""}`} onClick={()=>setLang("en")}>EN</button>
          </div>
          {view!=="dashboard" && <button className="btn btn-ghost btn-sm" onClick={()=>setView("dashboard")}>← {t("Dashboard","Dashboard")}</button>}
          {view==="session" && document_ && <button className="btn btn-primary btn-sm" onClick={()=>setView("document")}>📄 {t("Document","Document")}</button>}
          {view==="session" && <button className="btn btn-ghost btn-sm" onClick={generateDocument} disabled={loading}>{loading?"⏳":"✨"} {t("Genereer document","Generate document")}</button>}
          <div className="user-chip">
            {user.photoURL && <img src={user.photoURL} className="avatar" alt="" />}
            <span>{user.displayName?.split(" ")[0]}</span>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={()=>window._fbFns.signOut(window._fbAuth)}>{t("Uitloggen","Sign out")}</button>
        </div>
      </nav>

      {view==="dashboard" && (
        <div className="dashboard">
          <div className="dashboard-header">
            <h2>{t("Mijn sessies","My sessions")}</h2>
            <button className="btn btn-primary" onClick={()=>setShowNewSession(!showNewSession)}>+ {t("Nieuwe sessie","New session")}</button>
          </div>
          {showNewSession && (
            <div className="new-session-form">
              <label style={{fontSize:".8rem",color:"#888",display:"block",marginBottom:".4rem"}}>{t("Naam van het initiatief / feature","Name of the initiative / feature")}</label>
              <div className="input-row">
                <input className="input" placeholder={t("bv. Klantportaal self-service","e.g. Customer portal self-service")} value={newSessionTitle} onChange={e=>setNewSessionTitle(e.target.value)} onKeyDown={e=>e.key==="Enter"&&createSession()} />
                <button className="btn btn-primary" onClick={createSession}>{t("Start","Start")}</button>
                <button className="btn btn-ghost" onClick={()=>setShowNewSession(false)}>✕</button>
              </div>
            </div>
          )}
          <div className="sessions-grid">
            {sessions.length===0 && !showNewSession && <div className="empty-state"><div className="icon">💡</div><p>{t("Nog geen sessies. Start een nieuwe sessie om een probleem te verkennen.","No sessions yet. Start a new session to explore a problem.")}</p></div>}
            {sessions.map(s=>(
              <div key={s.id} className="session-card" onClick={()=>openSession(s)}>
                <div>
                  <div className="session-title">{s.title}</div>
                  <div className="session-meta">{s.ownerName} · {s.members?.length||1} {t("deelnemers","participants")} · fase {(s.stageIndex||0)+1}/{INTERVIEW_STAGES.length}</div>
                </div>
                <span className="session-badge">{INTERVIEW_STAGES[s.stageIndex||0]?.label[lang]}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {view==="session" && activeSession && (
        <div className="session-layout">
          <div className="session-topbar">
            <div className="session-title-bar">{activeSession.title}</div>
            <div className="stage-pills">
              {INTERVIEW_STAGES.map((s,i)=>(
                <div key={s.id} className={`stage-pill ${i<stageIndex?"done":i===stageIndex?"active":""}`}>{s.label[lang]}</div>
              ))}
            </div>
          </div>
          <div className="chat-area">
            {messages.map(m=>(
              <div key={m.id} className={`msg ${m.role}`}>
                <div className="msg-avatar">{m.role==="assistant"?"🤖":"👤"}</div>
                <div className="msg-bubble">{m.content}</div>
              </div>
            ))}
            {loading && <div className="msg assistant"><div className="msg-avatar">🤖</div><div className="msg-bubble"><div className="typing"><div className="dot"/><div className="dot"/><div className="dot"/></div></div></div>}
            <div ref={messagesEndRef}/>
          </div>

          <div className="chat-input-area">
            <textarea className="chat-textarea" placeholder={t("Typ je antwoord... (Enter = versturen, Shift+Enter = nieuwe regel)","Type your answer... (Enter = send, Shift+Enter = new line)")} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage()}}} rows={1}/>
            <button className="send-btn" onClick={sendMessage} disabled={loading||!input.trim()}>↑</button>
          </div>
        </div>
      )}

      {view==="document" && document_ && (
        <div className="doc-view">
          <div className="doc-header">
            <div className="doc-title">{document_.title||activeSession?.title}</div>
            <div style={{display:"flex",gap:".5rem"}}>
              {editingDoc
                ? <><button className="btn btn-primary btn-sm" onClick={saveDocument}>💾 {t("Opslaan","Save")}</button><button className="btn btn-ghost btn-sm" onClick={()=>setEditingDoc(false)}>✕</button></>
                : <button className="btn btn-ghost btn-sm" onClick={()=>{setDocDraft({...document_});setEditingDoc(true);}}>✏️ {t("Bewerken","Edit")}</button>
              }
            </div>
          </div>

          <div className="doc-section">
            <div className="doc-section-title">💡 {t("Waardehypothese","Value Hypothesis")}</div>
            {editingDoc?<textarea className="textarea-edit" value={docDraft.waardehypothese} onChange={e=>setDocDraft({...docDraft,waardehypothese:e.target.value})}/>:<p>{document_.waardehypothese}</p>}
          </div>
          <div className="doc-section">
            <div className="doc-section-title">🎯 {t("Strategische Relevantie","Strategic Relevance")}</div>
            {editingDoc?<textarea className="textarea-edit" value={docDraft.strategischeRelevantie} onChange={e=>setDocDraft({...docDraft,strategischeRelevantie:e.target.value})}/>:<p>{document_.strategischeRelevantie}</p>}
          </div>
          <div className="doc-section">
            <div className="doc-section-title">👥 {t("Voor Wie","For Whom")}</div>
            {(editingDoc?docDraft.voorWie:document_.voorWie)?.map((r,i)=>(
              <div key={i} className="role-card">
                {editingDoc
                  ? <><input className="input-edit" style={{marginBottom:".4rem"}} placeholder="Rol" value={docDraft.voorWie[i].rol} onChange={e=>{const v=[...docDraft.voorWie];v[i]={...v[i],rol:e.target.value};setDocDraft({...docDraft,voorWie:v})}}/><input className="input-edit" placeholder="Beschrijving" value={docDraft.voorWie[i].beschrijving} onChange={e=>{const v=[...docDraft.voorWie];v[i]={...v[i],beschrijving:e.target.value};setDocDraft({...docDraft,voorWie:v})}}/></>
                  : <><div className="role-name">{r.rol}</div><div className="role-desc">{r.beschrijving}</div></>}
              </div>
            ))}
          </div>
          <div className="doc-section scope-grid">
            <div>
              <div className="doc-section-title">✅ {t("Binnen Scope","In Scope")}</div>
              <ul className="doc-list">{(editingDoc?docDraft.scope:document_.scope)?.map((s,i)=><li key={i}>{editingDoc?<input className="input-edit" value={docDraft.scope[i]} onChange={e=>{const v=[...docDraft.scope];v[i]=e.target.value;setDocDraft({...docDraft,scope:v})}}/>:s}</li>)}</ul>
            </div>
            <div>
              <div className="doc-section-title">🚫 {t("Buiten Scope","Out of Scope")}</div>
              <ul className="doc-list">{(editingDoc?docDraft.buitenScope:document_.buitenScope)?.map((s,i)=><li key={i}>{editingDoc?<input className="input-edit" value={docDraft.buitenScope[i]} onChange={e=>{const v=[...docDraft.buitenScope];v[i]=e.target.value;setDocDraft({...docDraft,buitenScope:v})}}/>:s}</li>)}</ul>
            </div>
          </div>
          <div className="doc-section">
            <div className="doc-section-title">☑️ {t("Acceptatiecriteria","Acceptance Criteria")}</div>
            <ul className="doc-list">{(editingDoc?docDraft.acceptatiecriteria:document_.acceptatiecriteria)?.map((s,i)=><li key={i}>{editingDoc?<input className="input-edit" value={docDraft.acceptatiecriteria[i]} onChange={e=>{const v=[...docDraft.acceptatiecriteria];v[i]=e.target.value;setDocDraft({...docDraft,acceptatiecriteria:v})}}/>:s}</li>)}</ul>
          </div>
          <div className="doc-section">
            <div className="doc-section-title">🔒 AVG / GDPR</div>
            <div className="avg-grid">
              {["persoonsgegevens","dpia","verwerkingsverantwoordelijke"].map(key=>(
                <div className="avg-item" key={key}>
                  <label>{key==="persoonsgegevens"?t("Persoonsgegevens","Personal data"):key==="dpia"?"DPIA":t("Verwerkingsverantwoordelijke","Data controller")}</label>
                  {editingDoc?<input className="input-edit" value={docDraft.avg?.[key]||""} onChange={e=>setDocDraft({...docDraft,avg:{...docDraft.avg,[key]:e.target.value}})}/>:<p>{document_.avg?.[key]}</p>}
                </div>
              ))}
            </div>
          </div>
          <div className="doc-section">
            <div className="doc-section-title">❓ {t("Openstaande Vragen","Open Questions")}</div>
            <table className="oq-table">
              <thead><tr><th>{t("Vraag","Question")}</th><th>{t("Aan wie","To whom")}</th><th>{t("Eigenaar","Owner")}</th></tr></thead>
              <tbody>
                {(editingDoc?docDraft.openVragen:document_.openVragen)?.map((q,i)=>(
                  <tr key={i}>
                    {editingDoc
                      ? <><td><input className="input-edit" value={docDraft.openVragen[i].vraag} onChange={e=>{const v=[...docDraft.openVragen];v[i]={...v[i],vraag:e.target.value};setDocDraft({...docDraft,openVragen:v})}}/></td><td><input className="input-edit" value={docDraft.openVragen[i].aanWie} onChange={e=>{const v=[...docDraft.openVragen];v[i]={...v[i],aanWie:e.target.value};setDocDraft({...docDraft,openVragen:v})}}/></td><td><input className="input-edit" value={docDraft.openVragen[i].eigenaar} onChange={e=>{const v=[...docDraft.openVragen];v[i]={...v[i],eigenaar:e.target.value};setDocDraft({...docDraft,openVragen:v})}}/></td></>
                      : <><td>{q.vraag}</td><td>{q.aanWie}</td><td><span className="owner-chip">{q.eigenaar}</span></td></>}
                  </tr>
                ))}
              </tbody>
            </table>
            {editingDoc && <button className="add-row-btn" onClick={()=>setDocDraft({...docDraft,openVragen:[...(docDraft.openVragen||[]),{vraag:"",aanWie:"",eigenaar:""}]})}>+ {t("Vraag toevoegen","Add question")}</button>}
          </div>
          <div className="doc-section">
            <div className="doc-section-title">⚡ {t("Acties","Actions")}</div>
            <table className="oq-table">
              <thead><tr><th>{t("Actie","Action")}</th><th>{t("Verantwoordelijke","Responsible")}</th><th>{t("Eigenaar","Owner")}</th></tr></thead>
              <tbody>
                {(editingDoc?docDraft.acties:document_.acties)?.map((a,i)=>(
                  <tr key={i}>
                    {editingDoc
                      ? <><td><input className="input-edit" value={docDraft.acties[i].actie} onChange={e=>{const v=[...docDraft.acties];v[i]={...v[i],actie:e.target.value};setDocDraft({...docDraft,acties:v})}}/></td><td><input className="input-edit" value={docDraft.acties[i].verantwoordelijke} onChange={e=>{const v=[...docDraft.acties];v[i]={...v[i],verantwoordelijke:e.target.value};setDocDraft({...docDraft,acties:v})}}/></td><td><input className="input-edit" value={docDraft.acties[i].eigenaar} onChange={e=>{const v=[...docDraft.acties];v[i]={...v[i],eigenaar:e.target.value};setDocDraft({...docDraft,acties:v})}}/></td></>
                      : <><td>{a.actie}</td><td>{a.verantwoordelijke}</td><td><span className="owner-chip">{a.eigenaar}</span></td></>}
                  </tr>
                ))}
              </tbody>
            </table>
            {editingDoc && <button className="add-row-btn" onClick={()=>setDocDraft({...docDraft,acties:[...(docDraft.acties||[]),{actie:"",verantwoordelijke:"",eigenaar:""}]})}>+ {t("Actie toevoegen","Add action")}</button>}
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
